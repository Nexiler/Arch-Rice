# Low-battery guard policy for scripts/battery-guard.sh
# Send warning notification at or below this percentage.
LOW_BATTERY_WARN_THRESHOLD=25

# First-stage action threshold: suspend at or below this percentage.
LOW_BATTERY_SUSPEND_THRESHOLD=20

# Second-stage action threshold: shutdown at or below this percentage,
# but only after a prior suspend has already happened.
LOW_BATTERY_POWEROFF_THRESHOLD=15

# Delay before action to give time to plug in power.
LOW_BATTERY_GRACE_SECONDS=20

# Minimum seconds between repeated low-battery notifications.
LOW_BATTERY_COOLDOWN_SECONDS=300

# Battery sound alerts
# 1 to enable, 0 to disable.
BATTERY_SOUND_ENABLED=1

# auto: prefer canberra event sounds, fallback to paplay file playback.
# canberra: play only event ids via canberra-gtk-play.
# paplay: play only local files via paplay.
# none: disable playback.
BATTERY_SOUND_BACKEND="auto"

# 1 to play plugged/unplugged on monitor startup, 0 to play only state changes.
BATTERY_SOUND_ON_STARTUP=0

# Freedesktop sound event ids for canberra backend.
BATTERY_SOUND_EVENT_PLUGGED="power-plug"
BATTERY_SOUND_EVENT_UNPLUGGED="power-unplug"
BATTERY_SOUND_EVENT_LOW="battery-low"
BATTERY_SOUND_EVENT_CRITICAL="battery-caution"

# Optional sound files for paplay backend (absolute paths).
# Leave empty to skip file playback for that event.
BATTERY_SOUND_FILE_PLUGGED=""
BATTERY_SOUND_FILE_UNPLUGGED=""
BATTERY_SOUND_FILE_LOW=""
BATTERY_SOUND_FILE_CRITICAL=""
