# Low-battery guard policy for scripts/battery-guard.sh
# Send warning notification at or below this percentage.
LOW_BATTERY_WARN_THRESHOLD=25

# First-stage action threshold: suspend at or below this percentage.
LOW_BATTERY_SUSPEND_THRESHOLD=20

# Second-stage action threshold: shutdown at or below this percentage,
# but only after a prior suspend has already happened.
LOW_BATTERY_POWEROFF_THRESHOLD=15

# Delay before action to give time to plug in power.
LOW_BATTERY_GRACE_SECONDS=20

# Minimum seconds between repeated low-battery notifications.
LOW_BATTERY_COOLDOWN_SECONDS=300
