# Hypridle config: lock first, then suspend if still idle/locked.

general {
    lock_cmd = pidof hyprlock >/dev/null || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim/turn off displays after inactivity.
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Lock after 10 minutes idle.
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Suspend after 15 minutes total idle.
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
