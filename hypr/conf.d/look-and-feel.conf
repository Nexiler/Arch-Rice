# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

# Fractional monitor scaling blurs XWayland apps unless they render at scale 1.
xwayland {
    force_zero_scaling = true
}







####################################
### SWAYNC — BLUR & TRANSPARENCY ###
####################################
# Add this to your hyprland.conf (or source it as its own file, the
# same way you likely already source look-and-feel.conf).
#
# Why this is needed:
# SwayNC's own window has no transparency/blur — GTK just paints
# whatever style.css says. The actual "frosted glass" look comes from
# Hyprland blurring the layer-shell surface behind it. Without this
# rule, the panel will look like a flat, fully opaque box even though
# style.css uses transparent colors.

layerrule {
    name = swaync_blur
    match:namespace = ^(swaync-control-center|swaync-notification-window)$
    blur = true
    ignore_alpha = true
    xray = true
}

# ignore_alpha = true is the important part: SwayNC's control-center
# layer surface actually covers your *entire* screen (the empty part is
# an invisible click-catcher used to close the panel when you click
# outside it). Without ignore_alpha, Hyprland would blur that whole
# invisible area too, which looks like your entire screen got blurred
# whenever you open the notification center. ignore_alpha tells
# Hyprland to skip blurring fully-transparent pixels, so only the
# actual visible card gets the frosted-glass effect.

# Reload after adding this:
#   hyprctl reload
