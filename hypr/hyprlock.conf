background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 6
    brightness = 0.8
}

input-field {
    monitor =
    size = 260, 52
    outline_thickness = 2
    dots_size = 0.18
    dots_spacing = 0.22
    dots_center = true
    outer_color = rgb(c6d0f5)
    inner_color = rgb(303446)
    font_color = rgb(c6d0f5)
    fade_on_empty = false
    placeholder_text = Password
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(c6d0f5)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgb(c6d0f5)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 45
    halign = center
    valign = center
}